name: Weekly Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        # Use the playwright-core CLI from node_modules so the browser
        # revision is pinned against the version this repo depends on.
        run: node node_modules/playwright-core/cli.js install --with-deps chromium

      - name: Publish gate
        run: npm run prepublishOnly

      - name: Size budgets
        run: npm run size

      - name: Package smoke
        env:
          # Match the release workflow: fail loudly if Chromium is not
          # resolvable instead of letting a SPA-only build slip through.
          MADO_REQUIRE_BROWSER: "1"
        run: npm run package:smoke