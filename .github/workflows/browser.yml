name: Weekly Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install
        run: npm ci

      - name: Publish gate
        run: npm run prepublishOnly

      - name: Size budgets
        run: npm run size

      - name: Package smoke
        run: npm run package:smoke
