name: Browser Regression

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

jobs:
  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Build
        run: npm run build

      - name: Browser test
        run: npm run test:browser
