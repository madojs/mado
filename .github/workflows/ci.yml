name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install optional dev deps (for smoke tests)
        run: npm install --no-save linkedom esbuild

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Tests
        run: npm test

      - name: Bundle (size check)
        run: |
          npm run bundle
          echo "## Bundle sizes" >> $GITHUB_STEP_SUMMARY
          ls -lh out/*.js out/*.gz out/*.br 2>/dev/null | awk '{print "- `"$NF"` — "$5}' >> $GITHUB_STEP_SUMMARY || true