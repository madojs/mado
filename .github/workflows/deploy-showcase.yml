name: Deploy showcase to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "examples/showcase/**"
      - ".github/workflows/deploy-showcase.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Install optional dev deps
        run: npm install --no-save linkedom esbuild

      - name: Build
        run: npm run build

      - name: Bake static (SEO)
        run: npm run bake -- --example=showcase || true

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp examples/showcase/index.html deploy/
          cp examples/showcase/_redirects deploy/ 2>/dev/null || true
          cp examples/showcase/_headers deploy/ 2>/dev/null || true
          cp -r dist deploy/dist
          if [ -d out ]; then
            # Baked HTML goes to the deploy root and has priority over
            # index.html for concrete paths (see _redirects).
            cp -r out/* deploy/ 2>/dev/null || true
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy --project-name=mado-showcase --branch=main
