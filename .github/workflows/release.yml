name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Update npm
        run: npm install -g npm@latest

      # The tag name (without the leading `v`) must match the version
      # field in package.json. Mismatched tags publish the wrong artifact
      # under the wrong name and are extremely painful to unwind, so we
      # gate the workflow on equality before doing anything destructive.
      - name: Verify tag matches package.json
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          # Anything containing a dash is a SemVer prerelease (0.12.0-rc.1,
          # 1.0.0-beta.4, ...). Stable versions match `MAJOR.MINOR.PATCH`
          # only.
          if [[ "$PKG_VERSION" == *-* ]]; then
            echo "npm_tag=next"        >> "$GITHUB_OUTPUT"
            echo "prerelease=true"     >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest"      >> "$GITHUB_OUTPUT"
            echo "prerelease=false"    >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright Chromium
        # Browser-backed `mado release` runs through `package:smoke`
        # below. Use the playwright-core CLI from node_modules so the
        # browser revision is pinned against the framework's installed
        # Playwright; `npx playwright` would pull a different (possibly
        # mismatched) version.
        run: node node_modules/playwright-core/cli.js install --with-deps chromium

      - name: Publish gate
        run: npm run prepublishOnly

      - name: Size budgets
        run: npm run size

      - name: Package smoke
        env:
          # Force the smoke release to fail loudly if no Chromium is
          # resolvable, instead of silently capturing a SPA-only build.
          MADO_REQUIRE_BROWSER: "1"
        run: npm run package:smoke

      - name: Package dry-run
        run: npm pack --dry-run

      - name: Publish to npm
        # Prereleases publish under the `next` dist-tag so they never
        # become `latest` (which `npm install @madojs/mado` resolves by
        # default). Stable releases publish under `latest`.
        run: npm publish --access public --provenance --tag ${{ steps.version.outputs.npm_tag }}

      - name: Generate release notes
        run: node scripts/release-notes.mjs > RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE_FLAG