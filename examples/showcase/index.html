<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mado showcase</title>
    <meta name="description" content="Mado flagship example: landing + blog + admin." />
    <link rel="icon" href="data:," />
    <style>
      :root {
        --fg: #1a1a1a;
        --fg-muted: #666;
        --bg: #ffffff;
        --bg-alt: #f7f7f7;
        --accent: #2563eb;
        --border: #e5e5e5;
        --radius: 8px;
        --space: 1rem;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        line-height: 1.6;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--fg);
        background: var(--bg);
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      button {
        font: inherit;
        cursor: pointer;
      }
      h1, h2, h3 { line-height: 1.2; }
    </style>

    <script type="importmap">
      {
        "imports": {
          "madojs": "/dist/src/index.js",
          "madojs/": "/dist/src/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/dist/examples/showcase/main.js"></script>
  </body>
</html>
