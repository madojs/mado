<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tickets · Mado</title>
    <meta
      name="description"
      content="Zero-history LLM validation example for Mado: a small ticket admin SPA with CRUD, forms, cache invalidation, and query filters."
    />
    <link rel="icon" href="data:," />
    <style>
      :root {
        --fg: #101828;
        --fg-muted: #667085;
        --bg: #f4f6f9;
        --panel: #ffffff;
        --panel-soft: #f2f4f7;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --danger: #b42318;
        --warning: #b54708;
        --border: #d0d5dd;
        --radius: 6px;
        --ring: 0 0 0 3px rgba(15, 118, 110, .16);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        line-height: 1.55;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--fg);
        background: var(--bg);
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      h1, h2, h3 { line-height: 1.2; margin: 0 0 .5rem; }
      p { margin: 0 0 1rem; }
      :focus-visible {
        outline: none;
        box-shadow: var(--ring);
      }
      button, input, select, textarea {
        font: inherit;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        color: var(--fg);
      }
      input, select, textarea {
        min-height: 2.45rem;
        padding: .55rem .7rem;
      }
      input:hover, select:hover, textarea:hover {
        border-color: #98a2b3;
      }
      input:focus, select:focus, textarea:focus {
        border-color: var(--accent);
        outline: none;
        box-shadow: var(--ring);
      }
      textarea { min-height: 8rem; resize: vertical; }
      button {
        min-height: 2.35rem;
        padding: .55rem .85rem;
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover { background: var(--accent-strong); }
      button[disabled] { opacity: .55; cursor: not-allowed; }
      button.ghost {
        background: transparent;
        color: var(--fg);
        border-color: var(--border);
      }
      button.ghost:hover { background: var(--panel-soft); }
      button.danger {
        background: var(--danger);
        border-color: var(--danger);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      th, td {
        padding: .7rem .8rem;
        text-align: left;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      th {
        background: #f9fafb;
        color: var(--fg-muted);
        font-size: .78rem;
        font-weight: 700;
        text-transform: uppercase;
      }
      tbody tr:hover {
        background: #fcfcfd;
      }
      tr:last-child td { border-bottom: 0; }
      .muted { color: var(--fg-muted); }
      .err { color: var(--danger); }
      .warn { color: var(--warning); }
      ::view-transition-old(root),
      ::view-transition-new(root) { animation-duration: .18s; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@madojs/mado": "/dist/src/index.js",
          "@madojs/mado/": "/dist/src/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/dist/examples/tickets/main.js"></script>
  </body>
</html>
