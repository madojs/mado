# Minimal nginx config for a madojs SPA.
# gzip/brotli-static, immutable bundle cache, fallback to index.html.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use .gz/.br files prebuilt by scripts/bundle.mjs.
    # This costs no CPU at request time: nginx serves the compressed file.
    gzip_static on;
    # brotli_static on;  # requires ngx_brotli module

    # On-the-fly gzip for the rest (HTML, small assets).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # Hashed bundles (main-XXX.js, chunk-XXX.js): immutable.
    location ~* "^/(main|chunk|asset)-[A-Z0-9]+\.js$" {
        add_header Cache-Control "public, max-age=31536000, immutable";
        types { application/javascript js; }
        try_files $uri =404;
    }

    # Extension-based assets: one day cache.
    location ~* \.(css|svg|png|jpe?g|gif|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # HTML: always revalidate.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path → index.html.
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
